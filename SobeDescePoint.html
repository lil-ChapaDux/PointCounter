<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sobe e Desce</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #181c26;
  --surface2: #1f2435;
  --border: rgba(255,255,255,0.07);
  --text: #eef0f5;
  --muted: rgba(255,255,255,0.35);
  --gold: #f0c040;
  --gold-dim: rgba(240,192,64,0.15);
  --green: #66bb6a;
  --green-dim: rgba(102,187,106,0.13);
  --red: #ef5350;
  --red-dim: rgba(239,83,80,0.13);
}

html, body {
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

/* ── SETUP ── */
#setup {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: -webkit-fill-available;
  padding: 1.5rem;
  gap: 1.25rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.setup-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.8rem;
  letter-spacing: 0.12em;
  color: var(--gold);
  line-height: 1;
  text-align: center;
}

.setup-logo small {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.47rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  margin-top: 4px;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem;
  width: 100%;
  max-width: 380px;
}

.setup-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6rem;
  font-family: 'DM Mono', monospace;
}

.player-count-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 0.38rem;
  margin-bottom: 1.1rem;
}

.cnt-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  padding: 0.4rem 0;
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.15s;
  text-align: center;
  -webkit-appearance: none;
  appearance: none;
}

.cnt-btn.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.player-names {
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  margin-bottom: 1.1rem;
  max-height: 260px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.name-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.name-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.name-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  padding: 0.4rem 0.65rem;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
  transition: border-color 0.2s;
}

.name-input:focus { border-color: var(--gold); }

/* Rules cheat-sheet */
.rules-box {
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem 0.8rem;
  margin-bottom: 1rem;
}

.rules-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.18rem 0.6rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
}

.r-action { color: var(--gold); font-weight: 500; }
.r-desc { color: var(--muted); }

.start-btn {
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: 12px;
  color: #0f1117;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem;
  letter-spacing: 0.1em;
  padding: 0.65rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: opacity 0.15s, transform 0.1s;
}

.start-btn:active { transform: scale(0.97); opacity: 0.9; }

/* ── GAME ── */
#game {
  display: none;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.9rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 0.1em;
  color: var(--gold);
}

.topbar-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
}

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-size: 0.8rem;
  padding: 0.28rem 0.5rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.15s;
  font-family: 'DM Mono', monospace;
}

.players-area {
  flex: 1;
  display: grid;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0.4rem;
  gap: 0.4rem;
  grid-template-columns: 1fr 1fr;
  align-content: start;
}

/* Odd last player spans full width */
.players-area.p3 .player-card:last-child,
.players-area.p5 .player-card:last-child,
.players-area.p7 .player-card:last-child { grid-column: 1 / -1; }

.player-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  transition: border-color 0.2s;
}

.player-card.leader { border-color: var(--gold) !important; }
.player-card.leader::after {
  content: '🎯';
  position: absolute;
  top: 3px; right: 5px;
  font-size: 0.65rem;
}

.player-card.has-selection { border-color: rgba(255,255,255,0.22) !important; }
.player-card.has-selection.leader { border-color: var(--gold) !important; }

.card-header {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.38rem 0.55rem 0.1rem;
  flex-shrink: 0;
}

.p-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.p-name {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.p-score-wrap {
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
  padding: 0 0.4rem 0.05rem;
}

.p-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 8vw, 3.2rem);
  line-height: 1;
}

.p-score.bump { animation: bump 0.28s ease both; }

.p-progress { height: 3px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
.p-progress-fill { height: 100%; transition: width 0.4s ease; }

/* Action buttons */
.action-row1 {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  padding: 0.25rem 0.3rem 0.18rem;
  flex-shrink: 0;
}

.action-row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  padding: 0 0.3rem 0.25rem;
  flex-shrink: 0;
}

.a-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 7px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  font-weight: 500;
  padding: 0.3rem 0.1rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: background 0.1s, transform 0.1s, border-color 0.15s, color 0.15s;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.a-btn:active { transform: scale(0.87); }

.a-btn.blocked {
  opacity: 0.18;
  cursor: not-allowed;
  pointer-events: none;
}

.a-btn.neg.selected {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

.a-btn.penalty.selected {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

.a-btn.passou.selected {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

/* Preview */
.sel-preview {
  font-family: 'DM Mono', monospace;
  font-size: 0.57rem;
  text-align: center;
  color: var(--muted);
  padding: 0.05rem 0.3rem 0.22rem;
  min-height: 1rem;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}

.sel-preview span { color: var(--text); }

/* Bottom bar */
.bottombar {
  display: flex;
  align-items: center;
  padding: 0.38rem 0.75rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 0.38rem;
}

.bot-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  padding: 0.32rem 0.48rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.15s;
  white-space: nowrap;
}

.bot-btn:hover { color: var(--text); }
.bot-btn.danger { border-color: rgba(192,57,43,0.25); color: rgba(239,83,80,0.5); }
.bot-btn.danger:hover { color: #ef5350; border-color: rgba(239,83,80,0.5); }

.spacer { flex: 1; }

.confirm-btn {
  background: rgba(240,192,64,0.06);
  border: 1.5px solid rgba(240,192,64,0.18);
  border-radius: 8px;
  color: rgba(240,192,64,0.35);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  padding: 0.38rem 0.85rem;
  cursor: default;
  pointer-events: none;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.2s;
  letter-spacing: 0.05em;
  white-space: nowrap;
  flex-shrink: 0;
}

.confirm-btn.ready {
  background: var(--gold);
  border-color: var(--gold);
  color: #0f1117;
  cursor: pointer;
  pointer-events: all;
  font-weight: 700;
}

.confirm-btn.ready:active { transform: scale(0.95); }

/* Round indicator in bottombar */
.round-info {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  white-space: nowrap;
}

.vaza-counter {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  white-space: nowrap;
  padding: 0.28rem 0.55rem;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 7px;
  transition: color 0.2s, border-color 0.2s;
}

.vaza-counter .vc-used { color: var(--text); font-weight: 600; }
.vaza-counter.full { color: var(--green); border-color: rgba(102,187,106,0.3); }
.vaza-counter.over { color: var(--red); border-color: rgba(239,83,80,0.4); }

/* ── WINNER OVERLAY ── */
.winner-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 300;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  flex-direction: column;
  padding: 2rem;
}

.winner-overlay.show { display: flex; }

.winner-card {
  background: var(--surface);
  border: 1px solid rgba(240,192,64,0.3);
  border-radius: 22px;
  padding: 2rem 2.5rem;
  text-align: center;
  max-width: 320px;
  width: 100%;
  animation: fadeInUp 0.35s ease both;
}

.winner-trophy { font-size: 3.5rem; margin-bottom: 0.5rem; }

.winner-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

.winner-names {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.5rem;
  letter-spacing: 0.08em;
  color: var(--gold);
  line-height: 1.1;
  margin-bottom: 1.2rem;
}

.winner-btns {
  display: flex;
  gap: 0.6rem;
  justify-content: center;
}

.w-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  padding: 0.55rem 1rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.15s;
}

.w-btn.primary {
  background: var(--gold);
  border-color: var(--gold);
  color: #0f1117;
  font-weight: 700;
}

.w-btn:active { transform: scale(0.95); }

/* ── HISTORY MODAL ── */
.hist-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.hist-overlay.show { display: flex; }

.hist-sheet {
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 540px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.hist-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.1rem 0.7rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.hist-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--gold);
}

.hist-close {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'DM Mono', monospace;
  padding: 0.25rem 0.55rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}

.hist-body {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
  padding: 0.6rem 0.9rem;
}

.hist-empty {
  text-align: center;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  padding: 2rem 0;
  font-style: italic;
}

.hist-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'DM Mono', monospace;
  font-size: 0.66rem;
}

.hist-table th {
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.08em;
  padding: 0.2rem 0.3rem 0.45rem;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-size: 0.58rem;
  text-transform: uppercase;
}

.hist-table th:first-child { text-align: left; }

.hist-table td {
  padding: 0.28rem 0.3rem;
  text-align: center;
  color: var(--text);
}

.hist-table .tr-delta td { border-bottom: none; }
.hist-table .tr-total td { border-bottom: 1px solid rgba(255,255,255,0.05); }
.hist-table .tr-total:last-child td { border-bottom: none; }

.td-round { color: var(--muted); text-align: left !important; vertical-align: middle; }
.td-neg { color: var(--green); font-weight: 600; }
.td-pos { color: var(--red); font-weight: 600; }
.td-zero { color: var(--muted); }
.td-total { color: var(--muted); font-size: 0.6rem; }

/* Wake lock dot */
.wakelock-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #66bb6a;
  opacity: 0.5;
  flex-shrink: 0;
}
.wakelock-dot.off { background: var(--muted); opacity: 0.3; }

@keyframes bump {
  0%,100% { transform: scale(1); }
  40% { transform: scale(1.22); }
  70% { transform: scale(0.93); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- ── SETUP ── -->
<div id="setup">
  <div class="setup-logo">SOBE E DESCE<small>CONTADOR DE PONTOS</small></div>

  <div class="setup-card">
    <div class="setup-label">Nº de jogadores</div>
    <div class="player-count-row" id="count-row"></div>

    <div class="setup-label">Nomes</div>
    <div class="player-names" id="name-inputs"></div>

    <div class="setup-label" style="margin-bottom:0.5rem">Regras rápidas</div>
    <div class="rules-box" style="margin-bottom:1rem">
      <div class="rules-grid">
        <span class="r-action">-5</span><span class="r-desc">Mão Cheia (todas as vazas)</span>
        <span class="r-action">-4 / -3 / -2 / -1</span><span class="r-desc">Ganhou X vazas</span>
        <span class="r-action">+5</span><span class="r-desc">Penalização (foi e fez 0)</span>
        <span class="r-action">0</span><span class="r-desc">Passou (não foi a jogo)</span>
      </div>
    </div>

    <button type="button" class="start-btn" id="start-btn">JOGAR</button>
  </div>
</div>

<!-- ── GAME ── -->
<div id="game">
  <div class="topbar">
    <div class="topbar-title">SOBE E DESCE</div>
    <div class="topbar-meta" id="round-display">ronda 1</div>
    <div style="display:flex;align-items:center;gap:0.4rem;">
      <div class="wakelock-dot off" id="wakelock-dot" title="Ecrã sempre ligado"></div>
      <button type="button" class="icon-btn" id="config-btn">⚙ config</button>
    </div>
  </div>

  <div class="players-area" id="players-area"></div>

  <div class="bottombar">
    <button type="button" class="bot-btn" id="undo-btn">↩ desfazer</button>
    <button type="button" class="bot-btn" id="hist-btn">📋 histórico</button>
    <button type="button" class="bot-btn danger" id="reset-btn">reiniciar</button>
    <div class="spacer"></div>
    <div class="vaza-counter" id="vaza-counter">vazas: <span class="vc-used" id="vc-used">0</span>/5</div>
    <button type="button" class="confirm-btn" id="confirm-btn">✓ confirmar ronda</button>
  </div>
</div>

<!-- ── WINNER OVERLAY ── -->
<div class="winner-overlay" id="winner-overlay">
  <div class="winner-card">
    <div class="winner-trophy">🏆</div>
    <div class="winner-title">VENCEDOR</div>
    <div class="winner-names" id="winner-names"></div>
    <div class="winner-btns">
      <button type="button" class="w-btn" id="w-restart">reiniciar</button>
      <button type="button" class="w-btn primary" id="w-new">nova partida</button>
    </div>
  </div>
</div>

<!-- ── HISTORY MODAL ── -->
<div class="hist-overlay" id="hist-overlay">
  <div class="hist-sheet">
    <div class="hist-header">
      <div class="hist-title">📋 Histórico</div>
      <button type="button" class="hist-close" id="hist-close">✕ fechar</button>
    </div>
    <div class="hist-body" id="hist-body"></div>
  </div>
</div>

<script>
const COLORS = [
  { dot: '#4fc3f7' },
  { dot: '#ef5350' },
  { dot: '#66bb6a' },
  { dot: '#ab47bc' },
  { dot: '#ff9800' },
  { dot: '#e91e63' },
  { dot: '#00bcd4' },
  { dot: '#cddc39' },
];

const DEFAULT_NAMES = ['Xavier','Miro','Leonel','Vinagre','João','Ana','Pedro','Rita'];
const INITIAL_SCORE = 20;
const TOTAL_VAZAS = 5;

// Returns total vazas (abs of negative deltas) currently selected, optionally excluding one player
function calcUsedVazas(excludeIdx) {
  var used = 0;
  for (var i = 0; i < cfg.count; i++) {
    if (i === excludeIdx) continue;
    var sel = state.selections[i];
    if (sel !== null && sel < 0) used += Math.abs(sel);
  }
  return used;
}

// Row 1: -5 to -1 (ganhou vazas)
const ACTIONS_R1 = [
  { label: '-5', delta: -5, cls: 'neg' },
  { label: '-4', delta: -4, cls: 'neg' },
  { label: '-3', delta: -3, cls: 'neg' },
  { label: '-2', delta: -2, cls: 'neg' },
  { label: '-1', delta: -1, cls: 'neg' },
];
// Row 2: penalty and passou
const ACTIONS_R2 = [
  { label: '+5 pen.', delta: 5, cls: 'penalty' },
  { label: '0 passou', delta: 0, cls: 'passou' },
];

let cfg = { count: 4, names: DEFAULT_NAMES.slice() };
let state = { scores: [], selections: [], round: 1, history: [], gameOver: false };

// ── Wake Lock ──
var wakeLock = null;
function requestWakeLock() {
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').then(function(lock) {
      wakeLock = lock;
      document.getElementById('wakelock-dot').classList.remove('off');
      lock.addEventListener('release', function() {
        document.getElementById('wakelock-dot').classList.add('off');
      });
    }).catch(function() {});
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('wakelock-dot').classList.add('off');
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && document.getElementById('game').style.display !== 'none') {
    requestWakeLock();
  }
});

// ── Build count buttons (2–8) ──
(function() {
  var row = document.getElementById('count-row');
  for (var n = 2; n <= 8; n++) {
    (function(count) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cnt-btn' + (count === cfg.count ? ' active' : '');
      btn.textContent = count;
      btn.addEventListener('click', function() { setCount(count); });
      row.appendChild(btn);
    })(n);
  }
})();

// ── Static button wiring ──
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('config-btn').addEventListener('click', goSetup);
document.getElementById('undo-btn').addEventListener('click', undoLast);
document.getElementById('reset-btn').addEventListener('click', resetScores);
document.getElementById('hist-btn').addEventListener('click', openHistory);
document.getElementById('hist-close').addEventListener('click', closeHistory);
document.getElementById('confirm-btn').addEventListener('click', confirmRound);
document.getElementById('hist-overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('hist-overlay')) closeHistory();
});
document.getElementById('w-restart').addEventListener('click', function() {
  document.getElementById('winner-overlay').classList.remove('show');
  resetScores();
});
document.getElementById('w-new').addEventListener('click', function() {
  document.getElementById('winner-overlay').classList.remove('show');
  goSetup();
});

// ── Setup helpers ──
function setCount(n) {
  cfg.count = n;
  document.querySelectorAll('.cnt-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.textContent) === n);
  });
  buildNameInputs();
}

function buildNameInputs() {
  var el = document.getElementById('name-inputs');
  el.innerHTML = '';
  for (var i = 0; i < cfg.count; i++) {
    var row = document.createElement('div');
    row.className = 'name-row';
    row.innerHTML =
      '<div class="name-dot" style="background:' + COLORS[i].dot + '"></div>' +
      '<input class="name-input" id="ni' + i + '" value="' + cfg.names[i] + '" placeholder="Jogador ' + (i+1) + '" maxlength="12" />';
    el.appendChild(row);
  }
}

// ── Game start / navigation ──
function startGame() {
  for (var i = 0; i < cfg.count; i++) {
    var v = (document.getElementById('ni' + i).value || '').trim();
    cfg.names[i] = v || ('Jogador ' + (i+1));
  }
  state = {
    scores: Array(cfg.count).fill(INITIAL_SCORE),
    selections: Array(cfg.count).fill(null),
    round: 1,
    history: [],
    gameOver: false
  };
  buildGameUI();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = '-webkit-flex';
  document.getElementById('game').style.display = 'flex';
  requestWakeLock();
  render();
}

function goSetup() {
  releaseWakeLock();
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  buildNameInputs();
}

// ── Build player cards ──
function buildGameUI() {
  var area = document.getElementById('players-area');
  area.className = 'players-area p' + cfg.count;
  area.innerHTML = '';

  for (var i = 0; i < cfg.count; i++) {
    (function(idx) {
      var col = COLORS[idx];
      var card = document.createElement('div');
      card.className = 'player-card';
      card.id = 'card' + idx;

      var r1Html = ACTIONS_R1.map(function(a) {
        return '<button type="button" class="a-btn ' + a.cls + '" data-delta="' + a.delta + '">' + a.label + '</button>';
      }).join('');

      var r2Html = ACTIONS_R2.map(function(a) {
        return '<button type="button" class="a-btn ' + a.cls + '" data-delta="' + a.delta + '">' + a.label + '</button>';
      }).join('');

      card.innerHTML =
        '<div class="card-header">' +
          '<div class="p-dot" style="background:' + col.dot + '"></div>' +
          '<div class="p-name" style="color:' + col.dot + '">' + cfg.names[idx] + '</div>' +
        '</div>' +
        '<div class="p-score-wrap">' +
          '<div class="p-score" id="sc' + idx + '" style="color:' + col.dot + '">' + INITIAL_SCORE + '</div>' +
        '</div>' +
        '<div class="p-progress">' +
          '<div class="p-progress-fill" id="pf' + idx + '" style="background:' + col.dot + ';width:0%"></div>' +
        '</div>' +
        '<div class="action-row1">' + r1Html + '</div>' +
        '<div class="action-row2">' + r2Html + '</div>' +
        '<div class="sel-preview" id="sp' + idx + '"></div>';

      area.appendChild(card);

      // Wire action buttons
      card.querySelectorAll('.a-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (state.gameOver) return;
          var delta = parseInt(btn.dataset.delta);
          // Validate: total negative deltas (vazas) cannot exceed TOTAL_VAZAS
          if (delta < 0) {
            var usedByOthers = calcUsedVazas(idx);
            if (usedByOthers + Math.abs(delta) > TOTAL_VAZAS) return; // blocked
          }
          state.selections[idx] = delta;
          // Re-render all cards so blocked buttons update everywhere
          render();
        });
      });
    })(i);
  }
}

// ── Round logic ──
function confirmRound() {
  if (state.gameOver) return;
  // All must be selected
  for (var i = 0; i < cfg.count; i++) {
    if (state.selections[i] === null) return;
  }

  // Record history
  state.history.push({
    round: state.round,
    prevScores: state.scores.slice(),
    deltas: state.selections.slice()
  });

  // Apply deltas
  for (var i = 0; i < cfg.count; i++) {
    state.scores[i] += state.selections[i];
  }

  // Detect winners (score <= 0)
  var winners = [];
  for (var i = 0; i < cfg.count; i++) {
    if (state.scores[i] <= 0) winners.push(i);
  }

  state.round++;
  state.selections = Array(cfg.count).fill(null);
  render();

  if (winners.length > 0) {
    state.gameOver = true;
    setTimeout(function() { showWinner(winners); }, 380);
  }
}

function showWinner(idxs) {
  var names = idxs.map(function(i) { return cfg.names[i]; }).join('\n');
  document.getElementById('winner-names').textContent = names;
  document.getElementById('winner-overlay').classList.add('show');
}

function undoLast() {
  if (!state.history.length) return;
  var entry = state.history.pop();
  state.scores = entry.prevScores.slice();
  state.round = entry.round;
  state.selections = Array(cfg.count).fill(null);
  state.gameOver = false;
  render();
}

function resetScores() {
  state = {
    scores: Array(cfg.count).fill(INITIAL_SCORE),
    selections: Array(cfg.count).fill(null),
    round: 1,
    history: [],
    gameOver: false
  };
  render();
}

// ── Rendering ──
function render() {
  document.getElementById('round-display').textContent = 'ronda ' + state.round;
  var min = Math.min.apply(null, state.scores);
  for (var i = 0; i < cfg.count; i++) {
    renderCard(i, min);
  }
  renderConfirmBtn();
}

function renderCard(idx, min) {
  var s = state.scores[idx];
  if (min === undefined) min = Math.min.apply(null, state.scores);

  // Score display with bump animation
  var el = document.getElementById('sc' + idx);
  var prev = parseInt(el.textContent);
  if (!isNaN(prev) && prev !== s) {
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
  }
  el.textContent = s;

  // Progress bar: 0% at start (20pts), 100% at goal (0pts)
  var pct = Math.max(0, Math.min(100, Math.round((INITIAL_SCORE - s) / INITIAL_SCORE * 100)));
  document.getElementById('pf' + idx).style.width = pct + '%';

  // Leader indicator: lowest score (only if progressed)
  var card = document.getElementById('card' + idx);
  card.classList.toggle('leader', s === min && s < INITIAL_SCORE);

  // Selection state
  var sel = state.selections[idx];
  var hasSel = sel !== null;
  card.classList.toggle('has-selection', hasSel);

  // Button highlights + blocked state
  var usedByOthers = calcUsedVazas(idx);
  var myNegContrib = (sel !== null && sel < 0) ? Math.abs(sel) : 0;
  card.querySelectorAll('.a-btn').forEach(function(btn) {
    var d = parseInt(btn.dataset.delta);
    btn.classList.toggle('selected', hasSel && d === sel);
    // Block negative buttons that would exceed total vazas
    if (d < 0) {
      var wouldUse = usedByOthers + Math.abs(d);
      btn.classList.toggle('blocked', wouldUse > TOTAL_VAZAS);
    } else {
      btn.classList.remove('blocked');
    }
  });

  // Preview text
  var sp = document.getElementById('sp' + idx);
  if (!hasSel) {
    sp.innerHTML = '<span style="color:var(--muted)">selecionar ação</span>';
  } else {
    var newScore = s + sel;
    var arrow = sel < 0 ? '▼' : (sel > 0 ? '▲' : '–');
    var color = sel < 0 ? 'var(--green)' : (sel > 0 ? 'var(--red)' : 'var(--gold)');
    sp.innerHTML =
      '<span style="color:' + color + '">' + arrow + ' ' + (sel > 0 ? '+' : '') + sel + '</span>' +
      '<span style="color:var(--muted)"> → </span>' +
      '<span>' + newScore + '</span>';
  }
}

function renderConfirmBtn() {
  var allSelected = state.selections.every(function(s) { return s !== null; });
  var btn = document.getElementById('confirm-btn');
  btn.classList.toggle('ready', allSelected && !state.gameOver);

  // Update vaza counter
  var used = calcUsedVazas(-1); // all players
  var vcEl = document.getElementById('vc-used');
  var counterEl = document.getElementById('vaza-counter');
  if (vcEl) vcEl.textContent = used;
  if (counterEl) {
    counterEl.classList.toggle('full', used === TOTAL_VAZAS);
    counterEl.classList.toggle('over', used > TOTAL_VAZAS);
  }
}

// ── History modal ──
function openHistory() {
  renderHistory();
  document.getElementById('hist-overlay').classList.add('show');
}

function closeHistory() {
  document.getElementById('hist-overlay').classList.remove('show');
}

function renderHistory() {
  var body = document.getElementById('hist-body');
  if (!state.history.length) {
    body.innerHTML = '<div class="hist-empty">Nenhuma ronda confirmada ainda</div>';
    return;
  }

  var colHeaders = '<th class="td-round">R.</th>';
  for (var p = 0; p < cfg.count; p++) {
    colHeaders += '<th style="color:' + COLORS[p].dot + '">' + cfg.names[p] + '</th>';
  }

  var rowsHtml = '';
  for (var r = state.history.length - 1; r >= 0; r--) {
    var entry = state.history[r];
    var after = entry.prevScores.map(function(sc, i) { return sc + entry.deltas[i]; });

    // Delta row
    var deltaCells = '';
    for (var p = 0; p < cfg.count; p++) {
      var d = entry.deltas[p];
      var cls = d < 0 ? 'td-neg' : (d > 0 ? 'td-pos' : 'td-zero');
      deltaCells += '<td class="' + cls + '">' + (d > 0 ? '+' : '') + d + '</td>';
    }

    // Resulting score row
    var scoreCells = '';
    for (var p = 0; p < cfg.count; p++) {
      scoreCells += '<td class="td-total">' + after[p] + '</td>';
    }

    rowsHtml +=
      '<tr class="tr-delta">' +
        '<td class="td-round" rowspan="2" style="font-size:0.7rem">' + entry.round + '</td>' +
        deltaCells +
      '</tr>' +
      '<tr class="tr-total">' + scoreCells + '</tr>';
  }

  body.innerHTML =
    '<table class="hist-table">' +
      '<thead><tr>' + colHeaders + '</tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody>' +
    '</table>';
}

// ── Init ──
setCount(4);
buildNameInputs();
</script>
</body>
</html>
