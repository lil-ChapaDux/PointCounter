<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #181c26;
  --surface2: #1f2435;
  --border: rgba(255,255,255,0.07);
  --text: #eef0f5;
  --muted: rgba(255,255,255,0.35);
  --gold: #f0c040;
  --gold-dim: rgba(240,192,64,0.15);
  --green: #66bb6a;
}

html, body {
  height: 100%;
  height: 100dvh;
  height: -webkit-fill-available;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

/* ── SETUP ── */
#setup {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: -webkit-fill-available;
  padding: 1.5rem;
  gap: 1.25rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.setup-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 0.12em;
  color: var(--gold);
  line-height: 1;
  text-align: center;
}

.setup-logo small {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  margin-top: 4px;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.25rem;
  width: 100%;
  max-width: 340px;
}

.setup-label {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6rem;
  font-family: 'DM Mono', monospace;
}

.player-count-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
  margin-bottom: 1.1rem;
}

.cnt-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  padding: 0.5rem;
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.15s;
  text-align: center;
  -webkit-appearance: none;
  appearance: none;
}

.cnt-btn.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.player-names {
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  margin-bottom: 1.1rem;
}

.name-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.name-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.autocomplete-wrap {
  flex: 1;
  position: relative;
}

.name-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  padding: 0.4rem 0.65rem;
  outline: none;
  -webkit-user-select: text;
  user-select: text;
  transition: border-color 0.2s;
}

.name-input:focus { border-color: var(--gold); }

.autocomplete-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  z-index: 50;
  max-height: 150px;
  overflow-y: auto;
  display: none;
  list-style: none;
  box-shadow: 0 8px 16px rgba(0,0,0,0.5);
}

.autocomplete-list li {
  padding: 0.5rem 0.65rem;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
}

.autocomplete-list li:last-child { border-bottom: none; }
.autocomplete-list li:active { background: rgba(255,255,255,0.05); }

.meta-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.1rem;
}

.meta-label {
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}

.meta-select {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.88rem;
  padding: 0.38rem 0.6rem;
  outline: none;
}

.start-btn {
  width: 100%;
  background: var(--gold);
  border: none;
  border-radius: 12px;
  color: #0f1117;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.35rem;
  letter-spacing: 0.1em;
  padding: 0.65rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: opacity 0.15s, transform 0.1s;
}

.start-btn:active { transform: scale(0.97); opacity: 0.9; }

.leaderboard-btn {
  width: 100%;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--gold);
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 0.65rem;
  margin-top: 0.75rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}

/* ── GAME ── */
#game {
  display: none;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.9rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 0.1em;

}

.topbar-meta {

}

.icon-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-size: 0.8rem;
  padding: 0.28rem 0.5rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.15s;
  font-family: 'DM Mono', monospace;
}

.players-area {
  flex: 1;
  min-height: 0;
  display: -webkit-grid;
  display: grid;
  overflow: hidden;
  padding: 0.45rem;
  gap: 0.45rem;
}

.players-area.p2 { grid-template-columns: 1fr 1fr; }
.players-area.p3 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.players-area.p4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
.players-area.p3 .player-card:last-child { grid-column: 1 / -1; }

.player-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.player-card.leader { border-color: var(--gold) !important; }
.player-card.leader::after {
  content: '👑';
  position: absolute;
  top: 3px; right: 5px;
  font-size: 0.7rem;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 0.55rem 0.15rem;
  flex-shrink: 0;
}

.p-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.p-name {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.p-score-wrap {
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
  padding: 0 0.4rem 0.1rem;
}

.p-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 9vw, 3.5rem);
  line-height: 1;
}

.p-score.bump { animation: bump 0.3s ease both; }

.p-progress { height: 3px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
.p-progress-fill { height: 100%; transition: width 0.4s ease; }

.quick-btns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 0.4rem 0.5rem;
  flex: 1;
  min-height: 0;
}

.q-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: background 0.1s, transform 0.1s, border-color 0.1s;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}

.q-btn:active { 
  transform: scale(0.92); 
  background: rgba(255,255,255,0.2); 
  border-color: rgba(255,255,255,0.3);
}

.custom-row {
  display: flex;
  gap: 5px;
  padding: 0.2rem 0.5rem 0.5rem;
  flex-shrink: 0;
}

.c-input {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  padding: 0.4rem 0.5rem;
  outline: none;
  text-align: center;
  min-width: 0;
  -webkit-user-select: text;
  user-select: text;
  touch-action: manipulation;
}

.c-input::placeholder { color: rgba(255,255,255,0.25); font-size: 0.75rem; }

.c-add {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 7px;
  color: var(--text);
  font-size: 1.2rem;
  font-weight: bold;
  width: 36px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.12s;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  flex-shrink: 0;
}

.c-add:active { 
  transform: scale(0.88); 
  background: rgba(255,255,255,0.2); 
}

.err-flash {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  background: #c0392b;
  color: white;
  font-size: 0.6rem;
  padding: 2px 7px;
  border-radius: 5px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  font-family: 'DM Mono', monospace;
  z-index: 10;
  transition: opacity 0.2s;
}

.err-flash.show { opacity: 1; }

.bottombar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.38rem 0.9rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 0.5rem;
  overflow-x: auto;
}

.bot-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  padding: 0.32rem 0.65rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
  transition: all 0.15s;
  white-space: nowrap;
}

.bot-btn:hover { color: var(--text); }

.bot-btn.danger {
  border-color: rgba(192,57,43,0.25);
  color: rgba(239,83,80,0.6);
}

.bot-btn.danger:hover { color: #ef5350; border-color: rgba(239,83,80,0.5); }

.bot-btn.finish {
  background: rgba(102,187,106,0.1);
  border-color: rgba(102,187,106,0.3);
  color: var(--green);
}

.bot-btn.finish:hover { color: #81c784; background: rgba(102,187,106,0.2); }

/* Modals */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 200;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.modal-overlay.show { display: -webkit-flex; display: flex; }

.modal-sheet {
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 480px;
  max-height: 80vh;
  display: -webkit-flex;
  display: flex;
  flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

.modal-header {
  display: -webkit-flex;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.1rem 0.7rem;
  border-bottom: 1px solid var(--border);

}

.modal-header-actions {
  display: flex;
  gap: 0.5rem;
}

.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--gold);
}

.modal-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 0.75rem;
  font-family: 'DM Mono', monospace;
  padding: 0.25rem 0.55rem;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
  appearance: none;
}

.modal-btn.danger {
  color: #ef5350;
  border-color: rgba(239,83,80,0.3);
  background: rgba(239,83,80,0.1);
}

.modal-body {

}

.modal-empty {

.data-table {

.data-table th {

.data-table td {

}

.data-table tr:last-child td { border-bottom: none; }
.data-table .td-highlight { color: var(--gold); font-weight: 500; font-size: 0.85rem; }

/* Sortable Headers */
.sortable { cursor: pointer; transition: color 0.15s; user-select: none; }
.sortable:hover { color: var(--text); }
.sortable.active { color: var(--gold); }
.sort-icon { display: inline-block; width: 10px; font-size: 0.55rem; margin-left: 2px; opacity: 0.4; }
.sortable.active .sort-icon { opacity: 1; }

/* Rank Badges */
.rank-badges-wrap {
  display: flex;
  gap: 3px;
  align-items: center;
}
.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;

.rank-1 { background: var(--gold); color: #000; }

/* Wake lock indicator */

</style>
</head>
<body>

<div id="setup">
  <div class="setup-logo">DOMINÓ<small>CONTADOR DE PONTOS</small></div>

  <div class="setup-card">
    <div class="setup-label">Nº de jogadores</div>
    <div class="player-count-row">
      <button type="button" class="cnt-btn" data-count="2">2</button>
      <button type="button" class="cnt-btn active" data-count="3">3</button>
      <button type="button" class="cnt-btn" data-count="4">4</button>
    </div>

    <div class="setup-label">Nomes</div>
    <div class="player-names" id="name-inputs"></div>

    <div class="meta-row">
      <span class="meta-label">META:</span>
      <select class="meta-select" id="meta-select">
        <option value="100" selected>100 pts</option>
        <option value="200">200 pts</option>
        <option value="500">500 pts</option>
      </select>
    </div>

    <button type="button" class="start-btn" id="start-btn">JOGAR</button>
    <button type="button" class="leaderboard-btn" id="show-leaderboard-btn">🏆 CLASSIFICAÇÃO GERAL</button>
  </div>
</div>

<div id="game">
  <div class="topbar">
    <div class="topbar-title">DOMINÓ</div>
    <div class="topbar-meta" id="meta-display"></div>
    <div style="display:flex;align-items:center;gap:0.4rem;">
      <div class="wakelock-dot off" id="wakelock-dot" title="Ecrã sempre ligado"></div>
      <button type="button" class="icon-btn" id="config-btn">⚙ config</button>
    </div>
  </div>

  <div class="players-area" id="players-area"></div>

  <div class="bottombar">
    <button type="button" class="bot-btn" id="undo-btn">↩ desfazer</button>
    <button type="button" class="bot-btn" id="hist-btn">📋 histórico</button>
    <button type="button" class="bot-btn danger" id="reset-btn">reiniciar</button>
    <button type="button" class="bot-btn finish" id="finish-btn">🏁 terminar</button>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="hist-overlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">📋 Histórico da Partida</div>
      <button type="button" class="modal-btn" id="hist-close">✕ fechar</button>
    </div>
    <div class="modal-body" id="hist-body"></div>
  </div>
</div>

<div class="modal-overlay" id="leaderboard-overlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">🏆 Classificação Geral</div>
      <div class="modal-header-actions">
        <button type="button" class="modal-btn danger" id="clear-leaderboard-btn">limpar</button>
        <button type="button" class="modal-btn" id="leaderboard-close">✕ fechar</button>
      </div>
    </div>
    <div class="modal-body" id="leaderboard-body"></div>
  </div>
</div>

<script>
const COLORS = [
  { dot: '#4fc3f7' },
  { dot: '#ef5350' },
  { dot: '#66bb6a' },
  { dot: '#ab47bc' },
];

const QUICK = [5, 10, 15, 20, 25, 30];

let cfg = { count: 3, names: ['Xavier','Miro','Leonel','Vinagre'], target: 100 };
let state = { scores: [], history: [] };
let lbSort = { col: 'pts', desc: true }; 
let knownPlayers = [];

// ── PERSISTENCE ──
function saveState() {
  localStorage.setItem('domino_state', JSON.stringify({ cfg: cfg, state: state }));
}

function loadState() {
  var saved = localStorage.getItem('domino_state');
  if (saved) {
    var parsed = JSON.parse(saved);
    cfg = parsed.cfg;
    state = parsed.state;
    return true;
  }
  return false;
}

function clearState() {
  localStorage.removeItem('domino_state');
}

// ── WAKE LOCK ──
var wakeLock = null;
function requestWakeLock() {
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').then(function(lock) {
      wakeLock = lock;
      document.getElementById('wakelock-dot').classList.remove('off');
      lock.addEventListener('release', function() {
        document.getElementById('wakelock-dot').classList.add('off');
      });
    }).catch(function() {});
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
  document.getElementById('wakelock-dot').classList.add('off');
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && document.getElementById('game').style.display !== 'none') {
    requestWakeLock();
  }
});

// Event Listeners
document.querySelectorAll('.cnt-btn').forEach(function(btn) {
  btn.addEventListener('click', function() { setCount(parseInt(btn.dataset.count)); });
});
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('config-btn').addEventListener('click', goSetup);
document.getElementById('undo-btn').addEventListener('click', undoLast);
document.getElementById('reset-btn').addEventListener('click', resetScores);
document.getElementById('finish-btn').addEventListener('click', finishGame);
document.getElementById('hist-btn').addEventListener('click', openHistory);
document.getElementById('hist-close').addEventListener('click', closeHistory);
document.getElementById('hist-overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('hist-overlay')) closeHistory();
});
document.getElementById('show-leaderboard-btn').addEventListener('click', () => {
  document.getElementById('leaderboard-overlay').classList.add('show');
  renderLeaderboard();
});
document.getElementById('leaderboard-close').addEventListener('click', () => {
  document.getElementById('leaderboard-overlay').classList.remove('show');
});
document.getElementById('clear-leaderboard-btn').addEventListener('click', clearLeaderboard);
document.getElementById('leaderboard-overlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('leaderboard-overlay')) document.getElementById('leaderboard-overlay').classList.remove('show');
});

function setCount(n) {
  cfg.count = n;
  document.querySelectorAll('.cnt-btn').forEach(function(b) {
    b.classList.toggle('active', parseInt(b.dataset.count) === n);
  });
  buildNameInputs();
}

function loadKnownPlayers() {
  var leaderboard = JSON.parse(localStorage.getItem('domino_leaderboard') || '{}');
  knownPlayers = Object.keys(leaderboard);
}

function buildNameInputs() {
  const el = document.getElementById('name-inputs');
  el.innerHTML = '';
  loadKnownPlayers();

  for (var i = 0; i < cfg.count; i++) {
    (function(idx) {
      var row = document.createElement('div');
      row.className = 'name-row';
      row.innerHTML =
        '<div class="name-dot" style="background:' + COLORS[idx].dot + '"></div>' +
        '<div class="autocomplete-wrap">' +
          '<input class="name-input" id="ni' + idx + '" value="' + (cfg.names[idx] || '') + '" placeholder="Jogador ' + (idx+1) + '" maxlength="12" autocomplete="off" />' +
          '<ul class="autocomplete-list" id="ac' + idx + '"></ul>' +
        '</div>';
      el.appendChild(row);

      var inp = document.getElementById('ni' + idx);
      var list = document.getElementById('ac' + idx);

      inp.addEventListener('input', function() {
        var val = this.value.toLowerCase();
        list.innerHTML = '';
        if (!val) { list.style.display = 'none'; return; }
        
        var matches = knownPlayers.filter(function(p) {
          return p.toLowerCase().indexOf(val) !== -1 && p.toLowerCase() !== val;
        });
        
        if (matches.length === 0) { list.style.display = 'none'; return; }
        
        list.style.display = 'block';
        matches.forEach(function(m) {
          var li = document.createElement('li');
          li.textContent = m;
          
          var selectItem = function(e) {
            e.preventDefault();
            inp.value = m;
            list.style.display = 'none';
          };
          
          li.addEventListener('mousedown', selectItem);
          li.addEventListener('touchstart', selectItem, {passive: false});
          list.appendChild(li);
        });
      });

      inp.addEventListener('focus', function() { this.dispatchEvent(new Event('input')); });
      inp.addEventListener('blur', function() { setTimeout(() => { list.style.display = 'none'; }, 200); });
    })(i);
  }
}

function formatName(name) {
  name = (name || '').trim();
  if (!name) return "";
  return name.split(/\s+/).map(function(word) {
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  }).join(' ');
}

function startGame() {
  for (var i = 0; i < cfg.count; i++) {
    var v = document.getElementById('ni' + i).value;
    cfg.names[i] = formatName(v) || ('Jogador ' + (i+1));
  }
  cfg.target = parseInt(document.getElementById('meta-select').value);
  state = { scores: Array(cfg.count).fill(0), history: [] };
  
  activateGameUI();
}

function activateGameUI() {
  buildGameUI();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
  document.getElementById('game').style.height = '100dvh' in document.documentElement.style ? '100dvh' : '-webkit-fill-available';
  requestWakeLock();
  render(true);
}

function goSetup() {
  releaseWakeLock();
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  buildNameInputs();
}

function buildGameUI() {
  var area = document.getElementById('players-area');
  area.className = 'players-area p' + cfg.count;
  area.innerHTML = '';
  document.getElementById('meta-display').textContent = 'meta: ' + cfg.target + ' pts';

  for (var i = 0; i < cfg.count; i++) {
    (function(idx) {
      var col = COLORS[idx];
      var card = document.createElement('div');
      card.className = 'player-card';
      card.id = 'card' + idx;

      var qBtnsHtml = QUICK.map(function(p) {
        return '<button type="button" class="q-btn" data-pts="' + p + '">+' + p + '</button>';
      }).join('');

      card.innerHTML =
        '<div class="card-header">' +
          '<div class="p-dot" style="background:' + col.dot + '"></div>' +
          '<div class="p-name" style="color:' + col.dot + '">' + cfg.names[idx] + '</div>' +
        '</div>' +
        '<div class="p-score-wrap">' +
          '<div class="p-score" id="sc' + idx + '" style="color:' + col.dot + '">0</div>' +
        '</div>' +
        '<div class="p-progress">' +
          '<div class="p-progress-fill" id="pf' + idx + '" style="background:' + col.dot + ';width:0%"></div>' +
        '</div>' +
        '<div class="quick-btns">' + qBtnsHtml + '</div>' +
        '<div class="custom-row">' +
          '<input class="c-input" id="ci' + idx + '" type="number" min="5" step="5" placeholder="+outro" inputmode="numeric" />' +
          '<button type="button" class="c-add" id="ca' + idx + '">+</button>' +
        '</div>' +
        '<div class="err-flash" id="ef' + idx + '">múltiplo de 5!</div>';

      area.appendChild(card);

      card.querySelectorAll('.q-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { addPts(idx, parseInt(btn.dataset.pts)); });
      });

      document.getElementById('ca' + idx).addEventListener('click', function() { addCustom(idx); });

      document.getElementById('ci' + idx).addEventListener('keydown', function(e) {
        if (e.key === 'Enter') addCustom(idx);
      });
    })(i);
  }
}

function animateValue(id, start, end, duration) {
  if (start === end) return;
  var obj = document.getElementById(id);
  var startTimestamp = null;
  var step = function(timestamp) {
    if (!startTimestamp) startTimestamp = timestamp;
    var progress = Math.min((timestamp - startTimestamp) / duration, 1);
    obj.innerHTML = Math.floor(progress * (end - start) + start);
    if (progress < 1) {
      window.requestAnimationFrame(step);
    } else {
      obj.innerHTML = end;
    }
  };
  window.requestAnimationFrame(step);
}

function addPts(idx, pts) {
  state.history.push({ prevScores: state.scores.slice(), playerIdx: idx, pts: pts });
  state.scores[idx] += pts;
  render(false);
}

function addCustom(idx) {
  var inp = document.getElementById('ci' + idx);
  var v = parseInt(inp.value);
  if (!v || v <= 0 || v % 5 !== 0) { flashErr(idx); return; }
  state.history.push({ prevScores: state.scores.slice(), playerIdx: idx, pts: v });
  state.scores[idx] += v;
  inp.value = '';
  render(false);
}

function flashErr(idx) {
  var el = document.getElementById('ef' + idx);
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 1800);
}

function undoLast() {
  if (!state.history.length) return;
  var entry = state.history.pop();
  state.scores = entry.prevScores.slice();
  render(false);
}

function resetScores() {
  if (confirm("Limpar pontuação atual?")) {
    state = { scores: Array(cfg.count).fill(0), history: [] };
    render(true);
  }
}

function render(instant) {
  var max = Math.max.apply(null, state.scores);
  for (var i = 0; i < cfg.count; i++) {
    var s = state.scores[i];
    var el = document.getElementById('sc' + i);
    var prev = parseInt(el.textContent) || 0;
    
    if (prev !== s) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      if (instant) {
        el.textContent = s;
      } else {
        animateValue('sc' + i, prev, s, 350);
      }
    } else if (instant) {
      el.textContent = s;
    }
    
    document.getElementById('pf' + i).style.width = Math.min(100, Math.round(s / cfg.target * 100)) + '%';
    document.getElementById('card' + i).classList.toggle('leader', s > 0 && s === max);
  }
  saveState();
}

function finishGame() {
  if (!confirm("Terminar partida e registar classificação?")) return;

  var scores = [];
  for (var i = 0; i < cfg.count; i++) {
    scores.push({ name: cfg.names[i], score: state.scores[i] });
  }
  
  scores.sort((a, b) => b.score - a.score);

  var currentRank = 1;
  for (var i = 0; i < scores.length; i++) {
    if (i > 0 && scores[i].score < scores[i-1].score) {
      currentRank = i + 1;
    }
    scores[i].rank = currentRank;
    scores[i].pts = Math.max(0, cfg.count - currentRank);
  }

  var leaderboard = JSON.parse(localStorage.getItem('domino_leaderboard') || '{}');

  for (var i = 0; i < scores.length; i++) {
    var pName = scores[i].name.trim();
    
    if (!leaderboard[pName] || typeof leaderboard[pName] === 'number') {
      leaderboard[pName] = { 
        totalPts: leaderboard[pName] || 0, 
        last5: [],
        gamesPlayed: 0
      };
    }
    
    leaderboard[pName].totalPts += scores[i].pts;
    leaderboard[pName].last5.push(scores[i].rank);
    leaderboard[pName].gamesPlayed = (leaderboard[pName].gamesPlayed || 0) + 1;
    
    if (leaderboard[pName].last5.length > 5) {
      leaderboard[pName].last5.shift();
    }
  }

  localStorage.setItem('domino_leaderboard', JSON.stringify(leaderboard));
  clearState();
  goSetup();
}

function openHistory() {
  renderHistory();
  document.getElementById('hist-overlay').classList.add('show');
}
function closeHistory() {
  document.getElementById('hist-overlay').classList.remove('show');
}

function renderHistory() {
  var body = document.getElementById('hist-body');
  if (!state.history.length) {
    body.innerHTML = '<div class="modal-empty">Nenhuma jogada ainda</div>';
    return;
  }

  var rows = [];
  var running = Array(cfg.count).fill(0);
  for (var i = 0; i < state.history.length; i++) {
    var entry = state.history[i];
    running = entry.prevScores.slice();
    running[entry.playerIdx] += entry.pts;
    rows.push({ round: i + 1, playerIdx: entry.playerIdx, pts: entry.pts, totals: running.slice() });
  }

  var colHeaders = '<th style="color:var(--muted)">#</th><th>Jogador</th><th>+Pts</th>';
  for (var p = 0; p < cfg.count; p++) {
    colHeaders += '<th style="color:' + COLORS[p].dot + '">' + cfg.names[p] + '</th>';
  }

  var rowsHtml = '';
  for (var r = rows.length - 1; r >= 0; r--) {
    var row = rows[r];
    var playerName = cfg.names[row.playerIdx];
    var playerColor = COLORS[row.playerIdx].dot;
    var totalCells = '';
    for (var p = 0; p < cfg.count; p++) {
      var isActive = p === row.playerIdx;
      totalCells += '<td style="' + (isActive ? 'color:' + COLORS[p].dot + ';font-weight:700' : 'color:var(--muted)') + '">' + row.totals[p] + '</td>';
    }
    rowsHtml +=
      '<tr>' +
        '<td style="color:var(--muted)">' + row.round + '</td>' +
        '<td style="color:' + playerColor + ';font-weight:600">' + playerName + '</td>' +
        '<td class="td-highlight">+' + row.pts + '</td>' +
        totalCells +
      '</tr>';
  }

  body.innerHTML =
    '<table class="data-table">' +
      '<thead><tr>' + colHeaders + '</tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody>' +
    '</table>';
}

function renderLeaderboard() {
  var body = document.getElementById('leaderboard-body');
  var leaderboard = JSON.parse(localStorage.getItem('domino_leaderboard') || '{}');
  
  var players = Object.keys(leaderboard).map(name => {
    var data = leaderboard[name];
    var totalPts = typeof data === 'number' ? data : data.totalPts;
    var last5 = typeof data === 'number' ? [] : data.last5;
    var gamesPlayed = typeof data === 'number' ? 0 : (data.gamesPlayed || last5.length);
    var avg = gamesPlayed > 0 ? (totalPts / gamesPlayed) : 0;
    
    return { name: name, pts: totalPts, last5: last5, gamesPlayed: gamesPlayed, avg: avg };
  });
  
  players.sort((a, b) => {
    let valA = a[lbSort.col];
    let valB = b[lbSort.col];
    if (valA === valB) return 0;
    return lbSort.desc ? (valB - valA) : (valA - valB);
  });

  if (players.length === 0) {
    body.innerHTML = '<div class="modal-empty">Nenhum registo de vitórias ainda.</div>';
    return;
  }

  var rowsHtml = '';
  for (var i = 0; i < players.length; i++) {
    var badgesHtml = '';
    for (var j = 0; j < 5; j++) {
      if (j < players[i].last5.length) {
        var rank = players[i].last5[j];
        var rankClass = rank <= 4 ? 'rank-' + rank : 'rank-4';
        badgesHtml += '<div class="rank-badge ' + rankClass + '">' + rank + '</div>';
      } else {
        badgesHtml += '<div class="rank-badge rank-empty">-</div>';
      }
    }
    
    rowsHtml += 
      '<tr>' +
        '<td style="color:var(--muted)">' + (i + 1) + 'º</td>' +
        '<td style="font-weight:600">' + players[i].name + '</td>' +
        '<td style="text-align:center">' + players[i].gamesPlayed + '</td>' +
        '<td style="text-align:center">' + players[i].avg.toFixed(1) + '</td>' +
        '<td><div class="rank-badges-wrap">' + badgesHtml + '</div></td>' +
        '<td class="td-highlight" style="text-align:right">' + players[i].pts + ' pts</td>' +
      '</tr>';
  }

  const getSortIcon = (col) => {
    if (lbSort.col !== col) return '<span class="sort-icon"></span>';
    return `<span class="sort-icon">${lbSort.desc ? '▼' : '▲'}</span>`;
  };

  const getHeaderClass = (col) => lbSort.col === col ? 'sortable active' : 'sortable';

  body.innerHTML = 
    '<table class="data-table">' +
      '<thead><tr>' +
        '<th>Pos</th>' +
        '<th>Jogador</th>' +
        `<th class="${getHeaderClass('gamesPlayed')}" data-col="gamesPlayed" style="text-align:center" title="Total de Jogos">J${getSortIcon('gamesPlayed')}</th>` +
        `<th class="${getHeaderClass('avg')}" data-col="avg" style="text-align:center">Média${getSortIcon('avg')}</th>` +
        '<th>Últimos 5</th>' +
        `<th class="${getHeaderClass('pts')}" data-col="pts" style="text-align:right">Total${getSortIcon('pts')}</th>` +
      '</tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody>' +
    '</table>';

  body.querySelectorAll('.sortable').forEach(th => {
    th.addEventListener('click', (e) => {
      const col = e.currentTarget.dataset.col;
      if (lbSort.col === col) {
        lbSort.desc = !lbSort.desc;
      } else {
        lbSort.col = col;
        lbSort.desc = true;
      }
      renderLeaderboard();
    });
  });
}

function clearLeaderboard() {
  if (confirm("Tens a certeza que queres eliminar todo o histórico de classificações? Esta ação não pode ser revertida.")) {
    localStorage.removeItem('domino_leaderboard');
    renderLeaderboard();
  }
}

if (loadState()) {
  activateGameUI();
} else {
  setCount(3);
  buildNameInputs();
}
</script>
</body>
</html>
