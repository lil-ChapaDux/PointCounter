<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jogos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #181c26; --border: rgba(255,255,255,0.07);
  --text: #eef0f5; --muted: rgba(255,255,255,0.35);
  --gold: #f0c040; --gold-dim: rgba(240,192,64,0.12);
}
html, body {
  min-height: 100vh; background: var(--bg);
  font-family: 'Nunito', sans-serif; color: var(--text);
  -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
}
body {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 2rem 1.5rem; gap: 2.5rem;
}
.logo { text-align: center; }
.logo-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
  letter-spacing: 0.14em; color: var(--gold); line-height: 1;
}
.logo-sub {
  font-family: 'DM Mono', monospace; font-size: 0.55rem;
  letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-top: 6px;
}
.cards { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 340px; }
.game-card {
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px;
  padding: 1.4rem 1.5rem; cursor: pointer; text-decoration: none; color: var(--text);
  display: flex; align-items: center; gap: 1.1rem;
  transition: border-color 0.2s, transform 0.15s;
  touch-action: manipulation; position: relative; overflow: hidden;
}
.game-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--gold-dim); opacity: 0; transition: opacity 0.2s; border-radius: inherit;
}
.game-card:hover { border-color: rgba(240,192,64,0.45); transform: translateY(-2px); }
.game-card:hover::before { opacity: 1; }
.game-card:active { transform: scale(0.97); }
.card-icon { font-size: 2.4rem; flex-shrink: 0; line-height: 1; }
.card-info { flex: 1; min-width: 0; }
.card-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem;
  letter-spacing: 0.1em; color: var(--gold); line-height: 1; margin-bottom: 0.25rem;
}
.card-desc {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  color: var(--muted); letter-spacing: 0.06em; line-height: 1.5;
}
.card-arrow {
  font-family: 'DM Mono', monospace; font-size: 1rem;
  color: rgba(240,192,64,0.4); flex-shrink: 0; transition: color 0.2s, transform 0.2s;
}
.game-card:hover .card-arrow { color: var(--gold); transform: translateX(4px); }
.divider { display: flex; align-items: center; gap: 0.7rem; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text {
  font-family: 'DM Mono', monospace; font-size: 0.55rem;
  letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
}
.footer {
  font-family: 'DM Mono', monospace; font-size: 0.52rem;
  color: rgba(255,255,255,0.18); letter-spacing: 0.12em; text-align: center;
}
</style>
</head>
<body>
  <div class="logo">
    <div class="logo-title">🎲 JOGOS</div>
    <div class="logo-sub">escolhe um jogo para jogar</div>
  </div>

  <div class="cards">
    <a class="game-card" href="DominoPoint.html">
      <div class="card-icon">🁣</div>
      <div class="card-info">
        <div class="card-name">Dominó</div>
        <div class="card-desc">Contador de pontos<br>2 – 4 jogadores · meta configurável</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">ou</div>
      <div class="divider-line"></div>
    </div>
    <a class="game-card" href="SobeDescePoint.html">
      <div class="card-icon">🃏</div>
      <div class="card-info">
        <div class="card-name">Sobe e Desce</div>
        <div class="card-desc">Contador de pontos<br>2 – 8 jogadores · 5 vazas por ronda</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="footer">os três ficheiros devem estar na mesma pasta</div>
</body>
</html>
